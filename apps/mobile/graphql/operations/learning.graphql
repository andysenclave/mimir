query Courses {
  courses {
    id
    title
    description
    difficulty
    totalTimeMin
    orderIndex
    progress {
      id
      lessonsComplete
      completedAt
      quizScore
    }
    lessons {
      id
      title
      orderIndex
      readTimeMin
      completed
    }
  }
}

query CourseDetail($id: ID!) {
  course(id: $id) {
    id
    title
    description
    difficulty
    totalTimeMin
    orderIndex
    progress {
      id
      lessonsComplete
      completedAt
      quizScore
    }
    lessons {
      id
      title
      orderIndex
      readTimeMin
      completed
      content
    }
  }
}

query TodaysConcept {
  todaysConcept {
    id
    title
    body
    orderIndex
  }
}

query AISuggestions {
  aiSuggestions {
    id
    title
    body
    ctaLink
    generatedAt
  }
}

query CourseQuiz($courseId: ID!) {
  quiz(courseId: $courseId) {
    id
    courseId
    title
    courseTitle
    questions {
      id
      question
      options
      orderIndex
    }
  }
}

query AnswerFeedback($questionId: ID!) {
  answerFeedback(questionId: $questionId) {
    questionId
    correctIndex
    explanation
  }
}

mutation SubmitQuiz($input: SubmitQuizInput!) {
  submitQuiz(input: $input) {
    score
    total
    correct
    attemptId
  }
}

mutation CompleteLesson($input: CompleteLessonInput!) {
  completeLesson(input: $input) {
    id
    courseId
    lessonsComplete
    completedAt
  }
}
