# MM-036 — Profile tab queries.

query Profile {
  profile {
    id
    email
    displayName
    memberSince
    stats {
      totalReturnInr
      totalReturnPct
      budgetTierLabel
      cashRemaining
      coursesDone
      quizScore
    }
    watchlist {
      symbol
      ltp
      changePct
      alertEnabled
    }
  }
}

# aiInsight — MM-032. Placed here because it's consumed by invest screen but
# logically belongs with the AI-related queries.
query AiInsight($symbol: String!) {
  aiInsight(symbol: $symbol) {
    symbol
    body
    promptVersion
    generatedAt
    fromQuota
    quotaWarning
  }
}

# MM-037 — Watchlist mutations.
mutation AddToWatchlist($symbol: String!) {
  addToWatchlist(symbol: $symbol) {
    symbol
    alertEnabled
    ltp
    changePct
  }
}

mutation RemoveFromWatchlist($symbol: String!) {
  removeFromWatchlist(symbol: $symbol)
}

mutation ToggleWatchlistAlert($symbol: String!, $enabled: Boolean!) {
  toggleWatchlistAlert(symbol: $symbol, enabled: $enabled) {
    symbol
    alertEnabled
  }
}

# MM-041 — Notification preferences.
query NotificationPreferences {
  notificationPreferences {
    id
    streakEnabled
    budgetEnabled
    priceAlertsEnabled
    portfolioEvtEnabled
    educationalEnabled
    quietHoursStart
    quietHoursEnd
    dailyCap
  }
}

mutation UpdateNotificationPreferences($input: UpdateNotificationPreferencesInput!) {
  updateNotificationPreferences(input: $input) {
    id
    streakEnabled
    budgetEnabled
    priceAlertsEnabled
    portfolioEvtEnabled
    educationalEnabled
    quietHoursStart
    quietHoursEnd
    dailyCap
  }
}
