# MM-036 — Profile tab queries.

fragment ProfileFields on UserProfileGql {
  id
  email
  displayName
  memberSince
  stats {
    totalReturnInr
    totalReturnPct
    budgetTierLabel
    budgetTierId
    preferredTierId
    cashRemaining
    coursesDone
    quizScore
  }
  watchlist {
    symbol
    ltp
    changePct
    alertEnabled
  }
}

query Profile {
  profile {
    ...ProfileFields
  }
}

# MM-058 — Account + Trading Preferences mutations.
mutation UpdateDisplayName($name: String!) {
  updateDisplayName(name: $name) {
    ...ProfileFields
  }
}

mutation UpdatePreferredTier($tier: String!) {
  updatePreferredTier(tier: $tier) {
    ...ProfileFields
  }
}

mutation RequestAccountDeletion {
  requestAccountDeletion
}

mutation RequestDataExport {
  requestDataExport
}

# aiInsight — MM-032. Placed here because it's consumed by invest screen but
# logically belongs with the AI-related queries.
query AiInsight($symbol: String!) {
  aiInsight(symbol: $symbol) {
    symbol
    body
    promptVersion
    generatedAt
    fromQuota
    quotaWarning
  }
}

# MM-037 — Watchlist mutations.
mutation AddToWatchlist($symbol: String!) {
  addToWatchlist(symbol: $symbol) {
    symbol
    alertEnabled
    ltp
    changePct
  }
}

mutation RemoveFromWatchlist($symbol: String!) {
  removeFromWatchlist(symbol: $symbol)
}

mutation ToggleWatchlistAlert($symbol: String!, $enabled: Boolean!) {
  toggleWatchlistAlert(symbol: $symbol, enabled: $enabled) {
    symbol
    alertEnabled
  }
}

# MM-041 — Notification preferences.
query NotificationPreferences {
  notificationPreferences {
    id
    streakEnabled
    budgetEnabled
    priceAlertsEnabled
    portfolioEvtEnabled
    educationalEnabled
    quietHoursStart
    quietHoursEnd
    dailyCap
  }
}

mutation UpdateNotificationPreferences($input: UpdateNotificationPreferencesInput!) {
  updateNotificationPreferences(input: $input) {
    id
    streakEnabled
    budgetEnabled
    priceAlertsEnabled
    portfolioEvtEnabled
    educationalEnabled
    quietHoursStart
    quietHoursEnd
    dailyCap
  }
}
