# MM-028 — Invest screen operations.
# StockDetail query drives the initial stock data load.
# PlaceOrder mutation executes the trade.
# StockPriceUpdate subscription reused from market.graphql for live price.

query StockDetail($symbol: String!) {
  stock(symbol: $symbol) {
    symbol
    name
    ltp
    change
    changePct
    open
    high
    low
    close
    volume
    fetchedAt
  }
}

# MM-028 — intraday price series for MiniChart (Victory Native XL)
query StockIntraday($symbol: String!) {
  stockIntraday(symbol: $symbol) {
    timestamp
    price
  }
}

# MM-030 history tab — chronological trade list
query OrderHistory($limit: Int, $cursor: String) {
  orderHistory(limit: $limit, cursor: $cursor) {
    id
    symbol
    type
    quantity
    priceAtExecution
    orderValue
    realizedPnl
    status
    executedAt
  }
}

mutation PlaceOrder($input: PlaceOrderInput!) {
  placeOrder(input: $input) {
    id
    symbol
    type
    quantity
    priceAtExecution
    orderValue
    realizedPnl
    status
    correlationId
    executedAt
  }
}
